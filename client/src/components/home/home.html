<div class="column">
  <div class="row centered">
    @if (home()) {
      <div class="column max-width-50">
        <h1>{{home()!.title}}</h1>

        <cite>{{home()!.presentation}}</cite>
      </div>
      <img [ngSrc]="home()!.imageUrl" alt="" width="500" height="500" priority/>
    } @else {
      <mat-progress-spinner/>
    }
  </div>
  <div class="row">

  </div>
</div>
