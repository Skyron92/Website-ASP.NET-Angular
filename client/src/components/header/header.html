<header>
<mat-toolbar>
  <a mat-button [disableRipple]="true" routerLink="/">Léo Courtier</a>
  <span class="spacer"></span>
  @for (nav of navigators; track nav){
    <a mat-button disableRipple [routerLink]="nav.route">
      <mat-icon class="visible-on-hover">chevron_right</mat-icon>
      <mat-icon>{{nav.icon}}</mat-icon>
      {{nav.name}}
    </a>
  }
</mat-toolbar>
</header>
